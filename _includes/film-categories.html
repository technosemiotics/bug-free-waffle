<!-- categories for films grid display -->
  {% if film.categories %}
    {% assign categories = film.categories %}
    <span class="film-card__label">
      {% for category in categories %}
        <a href="{{site.baseurl}}/categories/#{{category|slugify}}" class="label"> {{ category }} </a>
        {% unless forloop.last %}&nbsp;{% endunless %}
      {% endfor %}
    </span>
  {% endif %}
