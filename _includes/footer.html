<footer class="site-footer h-card">
  <data class="u-url" value="{{ '/' | relative_url }}"></data>

  <div class="wrapper">

    <div class="footer-col-wrapper">
      <div class="footer-col-3">
        <ul class="contact-list">
            <li class="p-name"><a href="https://technosemiotics.net"><b>technosemiotics.net</b></a></li>
        </ul>


    <div class="social-links">
      {%- include footer-social.html -%}
    </div>
      </div>
      <div class="footer-col-2">
        <div class="footer-nav">
          {%- assign footer_page_paths = site.minima.nav_pages_footer | default: default_paths -%}
          {% include nav-items.html paths = footer_page_paths %}
        </div>
      </div>
      <div class="footer-col-3">
        <p>{{ site.title | escape }}<br/>{{ site.description | escape }}</p>
      </div>
    </div>


  </div>

</footer>
